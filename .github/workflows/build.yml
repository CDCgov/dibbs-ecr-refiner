name: Docker build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version variable
        id: vars
        run: |
          echo "version_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Test Refiner app build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          tags: ${{ steps.vars.outputs.app_tags }}
          push: false
          build-args: |
            VITE_GIT_HASH=${{ github.sha }}
            VITE_GIT_BRANCH=${{ github.ref_name }}
            VITE_GIT_VERSION=${{ steps.vars.outputs.version_tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print hash tags
        run: |
          echo "===== HASH TAGS ====="
          echo "Hash:    $VITE_GIT_HASH"
          echo "Branch: $VITE_GIT_BRANCH"
          echo "Version:    $VITE_GIT_VERSION"
          echo "=================================="
        env:
          VITE_GIT_HASH: ${{ github.sha }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_GIT_VERSION: ${{ steps.vars.outputs.version_tag }}

  lambda-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Refiner Lambda build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
  ops-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Refiner Ops build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ops
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
