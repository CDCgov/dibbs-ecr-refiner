name: Run tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24
  PYTHON_RUNNER_VERSION: "3.14"

defaults:
  run:
    working-directory: ./refiner

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup python ${{env.PYTHON_RUNNER_VERSION}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_RUNNER_VERSION}}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r dev-requirements.txt -r requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/unit

  run-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup python ${{env.PYTHON_RUNNER_VERSION}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_RUNNER_VERSION}}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r dev-requirements.txt -r requirements.txt
      - name: Run integration tests
        run: |
          pytest tests/integration --ignore=tests/integration/scenarios

  run-scenarios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup python ${{env.PYTHON_RUNNER_VERSION}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_RUNNER_VERSION}}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r dev-requirements.txt -r requirements.txt
      - name: Run scenarios
        run: pytest tests/integration/scenarios

  run-lambda-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup python ${{env.PYTHON_RUNNER_VERSION}}
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_RUNNER_VERSION}}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r dev-requirements.txt -r app/lambda/dev-requirements.txt -r app/lambda/requirements.txt
      - name: Run tests
        run: |
          pytest app/lambda
  run-ts-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}
      - name: Install dependencies
        working-directory: ./client
        run: npm i
      - name: Run tests
        working-directory: ./client
        run: npm test
  run-e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      VITE_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      VITE_GIT_HASH: ${{ github.sha }}
      VERSION: ${{ github.sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: Install Dependencies
        run: npm ci
        working-directory: client

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-
            ${{ runner.os }}-playwright-
            ${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: client

      - name: Start Application
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --detach --build

      - name: Wait for Auth Service to be Ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8082/realms/refiner > /dev/null 2>&1; do sleep 2; done'
          echo "Auth Service is ready!"

      - name: Wait for app server proxy to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8081/api/healthcheck > /dev/null 2>&1; do sleep 2; done'
          echo "App server proxy is ready!"

      - name: Run Playwright E2E Tests
        run: npm run e2e
        working-directory: client

      - name: Upload HTML Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30
